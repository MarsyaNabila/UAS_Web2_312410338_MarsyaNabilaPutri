<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Library Komik Digital - UAS Web 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased">

    <div id="app">
        <nav class="bg-pink-600 p-4 text-white shadow-lg sticky top-0 z-50">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                
                <h1 class="text-xl font-extrabold tracking-wider flex items-center gap-2">
                    <span></span> <span>E-Library Marsya's</span>
                </h1>
                
                <div class="space-x-4 font-semibold flex items-center text-sm">
                    <router-link to="/" class="hover:text-pink-200 transition py-1">Katalog</router-link>
                    
                    <router-link v-if="isLoggedIn" to="/dashboard" class="hover:text-pink-200 transition py-1">Dashboard Admin</router-link>
                    
                    <button v-if="isLoggedIn" @click="logout" class="bg-rose-500 hover:bg-rose-600 px-4 py-2 rounded-xl transition shadow-md shadow-rose-900/20 font-bold">
                        Logout
                    </button>
                    <router-link v-else to="/login" class="bg-white text-pink-600 hover:bg-pink-50 px-4 py-2 rounded-xl transition shadow-md font-bold">
                        Login Admin
                    </router-link>
                </div>

            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-6">
            <router-view></router-view>
        </main>
    </div>

    <script>
        // ============================================================================
        // 1. KOMPONEN: LOGIN ADMIN (Sebelum ini: komponen/Login.js)
        // ============================================================================
        const Login = {
            template: `
                <div class="min-h-screen w-full flex items-center justify-center p-4 bg-[#fff1f2] font-sans bg-[radial-gradient(#fecdd3_1.5px,transparent_1.5px)] [background-size:24px_24px]">
                    <div class="fixed inset-0 overflow-hidden pointer-events-none">
                        <div class="absolute -top-24 -right-24 w-96 h-96 bg-pink-200 rounded-full blur-3xl opacity-60"></div>
                        <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-rose-200 rounded-full blur-3xl opacity-60"></div>
                    </div>

                    <div class="relative z-10 w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-[0_20px_50px_rgba(244,114,182,0.2)] border border-pink-100">
                        <div class="flex justify-center mb-8">
                            <div class="relative">
                                <div class="w-20 h-20 bg-gradient-to-br from-pink-300 to-rose-400 rounded-full flex items-center justify-center shadow-lg shadow-pink-300/50">
                                    <span class="text-3xl">🦋</span>
                                </div>
                                <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-white rounded-full border-2 border-pink-200"></div>
                            </div>
                        </div>

                        <div class="text-center mb-10">
                            <h2 class="text-2xl font-black text-pink-900 tracking-tight">Marsya’s Library</h2>
                            <p class="text-pink-400 text-xs font-semibold uppercase tracking-widest mt-2">Administrator Access</p>
                        </div>

                        <form @submit.prevent="submitLogin" class="space-y-5">
                            <div class="space-y-2">
                                <input v-model="username" type="text" 
                                       class="w-full px-6 py-4 bg-pink-50/80 border-2 border-pink-300 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 shadow-inner text-pink-900 font-semibold placeholder:text-pink-400/80 transition-all" 
                                       placeholder="Username" required>
                            </div>
                            
                            <div class="space-y-2">
                                <input v-model="password" type="password" 
                                       class="w-full px-6 py-4 bg-pink-50/80 border-2 border-pink-300 rounded-2xl focus:outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 shadow-inner text-pink-900 font-semibold placeholder:text-pink-400/80 transition-all" 
                                       placeholder="Password" required>
                            </div>
                            
                            <button type="submit" 
                                    class="w-full py-4 mt-4 bg-gradient-to-r from-pink-400 to-rose-400 rounded-2xl text-white font-bold text-sm hover:shadow-lg hover:shadow-pink-300 transition-all hover:-translate-y-1 active:scale-95 uppercase tracking-wider">
                                Log In
                            </button>
                        </form>
                    </div>
                </div>
            `,
            data() { return { username: '', password: '' } },
            methods: {
                async submitLogin() {
                    try {
                        const response = await axios.post('http://localhost:8080/api/auth/login', {
                            username: this.username,
                            password: this.password
                        });
                        if (response.data.token) {
                            localStorage.setItem('isLoggedIn', 'true');
                            localStorage.setItem('token', response.data.token);
                            alert('Login Berhasil!');
                            // Memperbaharui state root instance secara langsung
                            this.$root.isLoggedIn = true;
                            this.$router.push('/dashboard');
                        }
                    } catch (error) {
                        alert('Login Gagal, Coba Lagi.');
                    }
                }
            }
        };

        // ============================================================================
        // 2. KOMPONEN: USER BUKU / RIWAYAT STATS (Sebelum ini: komponen/Buku.js)
        // ============================================================================
        const BukuStatsManager = {
            template: `
                <div class="min-h-screen bg-pink-100 p-4 md:p-8 space-y-8 font-sans">
                    <div class="bg-white p-8 rounded-[3rem] border-4 border-pink-200 shadow-xl flex justify-between items-center">
                        <div>
                            <h1 class="text-4xl font-black text-pink-600 tracking-tighter uppercase">Katalog E-Library Marsya's Digital</h1>
                            <p class="text-pink-400 font-bold text-sm tracking-widest mt-1">Selamat datang! Cari, lihat ketersediaan stok, dan lakukkan simulasi peminjaman komik & buku favoritmu secara langsung.</p>
                        </div>
                        <div class="hidden md:block">
                            <span class="px-6 py-3 bg-pink-100 text-pink-600 rounded-full text-xs font-black uppercase tracking-widest border-2 border-pink-200">
                                STATUS: ONLINE
                            </span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        <div class="bg-pink-500 p-8 rounded-[3rem] border-4 border-pink-400 shadow-xl flex items-center gap-5 text-white">
                            <div class="w-16 h-16 bg-white/20 rounded-3xl flex items-center justify-center text-3xl">📚</div>
                            <div>
                                <span class="block text-[10px] font-black text-pink-200 uppercase tracking-widest">Total Judul</span>
                                <span class="text-2xl font-black">{{ totalJudul }} Koleksi</span>
                            </div>
                        </div>
                        <div class="bg-pink-500 p-8 rounded-[3rem] border-4 border-pink-400 shadow-xl flex items-center gap-5 text-white">
                            <div class="w-16 h-16 bg-white/20 rounded-3xl flex items-center justify-center text-3xl">📦</div>
                            <div>
                                <span class="block text-[10px] font-black text-pink-200 uppercase tracking-widest">Total Stok</span>
                                <span class="text-2xl font-black">{{ totalStok }} Pcs</span>
                            </div>
                        </div>
                        <div class="bg-pink-500 p-8 rounded-[3rem] border-4 border-pink-400 shadow-xl flex items-center gap-5 text-white sm:col-span-2 lg:col-span-1">
                            <div class="w-16 h-16 bg-white/20 rounded-3xl flex items-center justify-center text-3xl">⚠️</div>
                            <div>
                                <span class="block text-[10px] font-black text-pink-200 uppercase tracking-widest">Kosong</span>
                                <span class="text-2xl font-black">{{ totalKosong }} Judul</span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-[3rem] border-4 border-pink-200 shadow-2xl p-6 overflow-hidden">
                        <h3 class="text-xl font-black text-pink-600 mb-6 uppercase p-2 tracking-widest ml-2">Riwayat Peminjaman</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-pink-100 text-pink-600 text-[10px] font-black uppercase tracking-widest">
                                    <tr>
                                        <th class="p-5 rounded-tl-2xl">Peminjam</th>
                                        <th class="p-5">Judul Komik & Buku</th>
                                        <th class="p-5">Tanggal</th>
                                        <th class="p-5 rounded-tr-2xl text-center">Status</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y-2 divide-pink-50">
                                    <tr v-for="log in listPeminjam" :key="log.id" class="hover:bg-pink-50">
                                        <td class="p-5 font-black text-pink-900">{{ log.nama_peminjam }}</td>
                                        <td class="p-5 font-bold text-pink-500">{{ log.judul }}</td>
                                        <td class="p-5 font-bold text-pink-400">{{ log.tanggal_pinjam }}</td>
                                        <td class="p-5 text-center">
                                            <span class="px-4 py-2 bg-pink-500 text-white rounded-full text-[10px] font-black uppercase">{{ log.status }}</span>
                                        </td>
                                    </tr>
                                    <tr v-if="listPeminjam.length === 0">
                                        <td colspan="4" class="p-5 text-center text-gray-400 font-bold">Belum ada data log peminjaman.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `,
            props: ['listBuku'], // Menerima data dari parent component
            data() {
                return {
                    totalJudul: 0,
                    totalStok: 0,
                    totalKosong: 0,
                    listPeminjam: []
                }
            },
            watch: {
                // Sentiasa pantau perubahan data senarai buku untuk dikira semula secara dinamik
                listBuku: {
                    handler(newList) {
                        if (newList && newList.length > 0) {
                            this.totalJudul = newList.length;
                            this.totalStok = newList.reduce((acc, curr) => acc + (parseInt(curr.stok) || 0), 0);
                            this.totalKosong = newList.filter(buku => (parseInt(buku.stok) || 0) <= 0).length;
                        }
                    },
                    immediate: true,
                    deep: true
                }
            },
            methods: {
                async fetchLogPeminjaman() {
                    try {
                        const response = await axios.get('http://localhost:8080/api/peminjaman');
                        this.listPeminjam = response.data;
                    } catch (error) { console.error("Gagal memuat log:", error); }
                }
            },
            mounted() {
                this.fetchLogPeminjaman();
            }
        };

        // ============================================================================
        // 3. KOMPONEN: DASHBOARD ADMIN (Sebelum ini: komponen/Dashboard.js)
        // ============================================================================
        const Dashboard = {
            template: `
                <div class="min-h-screen bg-pink-50 p-6 md:p-12 space-y-12">
                    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="bg-gradient-to-br from-pink-500 to-pink-600 text-white p-6 rounded-[2rem] shadow-xl shadow-pink-200 flex items-center space-x-6 border-4 border-white">
                            <div class="bg-white/20 p-4 rounded-2xl text-3xl">📚</div>
                            <div>
                                <p class="text-xs font-black uppercase tracking-widest text-pink-100">Total Judul</p>
                                <h3 class="text-3xl font-black mt-1">{{ totalJudul }} Koleksi</h3>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-pink-500 to-pink-600 text-white p-6 rounded-[2rem] shadow-xl shadow-pink-200 flex items-center space-x-6 border-4 border-white">
                            <div class="bg-white/20 p-4 rounded-2xl text-3xl">📦</div>
                            <div>
                                <p class="text-xs font-black uppercase tracking-widest text-pink-100">Total Stok</p>
                                <h3 class="text-3xl font-black mt-1">{{ totalStok }} Pcs</h3>
                            </div>
                        </div>

                        <div class="bg-gradient-to-br from-pink-500 to-pink-600 text-white p-6 rounded-[2rem] shadow-xl shadow-pink-200 flex items-center space-x-6 border-4 border-white">
                            <div class="bg-white/20 p-4 rounded-2xl text-3xl">⚠️</div>
                            <div>
                                <p class="text-xs font-black uppercase tracking-widest text-pink-100">Kosong</p>
                                <h3 class="text-3xl font-black mt-1">{{ totalKosong }} Judul</h3>
                            </div>
                        </div>
                    </div>

                    <div class="max-w-6xl mx-auto bg-white p-10 rounded-[3rem] shadow-2xl shadow-pink-200 border-4 border-pink-100">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                            <div>
                                <h2 class="text-4xl font-black text-pink-600 tracking-tighter">Manajemen Koleksi Komik & Buku</h2>
                                <p class="text-pink-400 font-bold mt-1 uppercase tracking-widest text-xs">Sirkulasi Data Koleksi Komik & Buku digital disini.</p>
                            </div>
                            <button @click="openModal('add')" class="bg-pink-600 hover:bg-pink-700 text-white px-8 py-4 rounded-2xl text-sm font-black shadow-lg shadow-pink-300 transition-all">
                                <span>➕</span> Tambah Buku Baru
                            </button>
                        </div>

                        <div class="overflow-hidden rounded-[2rem] border-2 border-pink-100">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-pink-100 text-pink-600 text-[10px] font-black uppercase tracking-widest">
                                        <th class="p-6">Judul</th>
                                        <th class="p-6">Penulis</th>
                                        <th class="p-6">Genre ID</th>
                                        <th class="p-6">Stok</th>
                                        <th class="p-6 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-pink-50">
                                    <tr v-for="buku in listBuku" :key="buku.id">
                                        <td class="p-6 font-black">{{ buku.judul }}</td>
                                        <td class="p-6">{{ buku.penulis }}</td>
                                        <td class="p-6">{{ buku.kategori_id }}</td>
                                        <td class="p-6">
                                            <span :class="parseInt(buku.stok) === 0 ? 'text-rose-600 font-black bg-rose-50 px-3 py-1 rounded-full' : 'text-gray-700'">
                                                {{ buku.stok }}
                                            </span>
                                        </td>
                                        <td class="p-6 text-center space-x-3">
                                            <button @click="openModal('edit', buku)" class="text-pink-500 font-black">EDIT</button>
                                            <button @click="deleteBuku(buku.id)" class="text-rose-500 font-black">HAPUS</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="max-w-6xl mx-auto bg-white p-10 rounded-[3rem] shadow-2xl shadow-pink-200 border-4 border-pink-100">
                        <div class="mb-6">
                            <h2 class="text-3xl font-black text-pink-600 tracking-tighter uppercase">Riwayat Peminjaman</h2>
                        </div>
                        <div class="overflow-hidden rounded-[2rem] border-2 border-pink-100">
                            <table class="w-full text-left">
                                <thead>
                                    <tr class="bg-pink-100 text-pink-600 text-[10px] font-black uppercase tracking-widest">
                                        <th class="p-6">Peminjam</th>
                                        <th class="p-6">Judul Komik & Buku</th>
                                        <th class="p-6">Tanggal</th>
                                        <th class="p-6">Status</th>
                                        <th class="p-6 text-center">Aksi</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-pink-50">
                                    <tr v-for="log in listPeminjaman" :key="log.id">
                                        <td class="p-6 font-bold text-gray-800">{{ log.nama_peminjam }}</td>
                                        <td class="p-6 font-medium text-pink-600">{{ log.judul }}</td>
                                        <td class="p-6 text-pink-400">{{ log.tanggal_pinjam }}</td>
                                        <td class="p-6">
                                            <span class="bg-pink-500 text-white px-4 py-2 rounded-full text-xs font-black uppercase tracking-wider">
                                                {{ log.status }}
                                            </span>
                                        </td>
                                        <td class="p-6 text-center">
                                            <button v-if="log.status === 'Dipinjam'" @click="kembalikanBuku(log.id)" class="text-blue-500 font-black hover:underline">
                                                Kembalikan
                                            </button>
                                            <span v-else class="text-gray-400 text-sm font-bold">-</span>
                                        </td>
                                    </tr>
                                    <tr v-if="listPeminjaman.length === 0">
                                        <td colspan="5" class="p-6 text-center text-gray-400 font-bold">Belum ada riwayat peminjaman.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div v-if="showModal" class="fixed inset-0 bg-pink-900/50 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                        <div class="bg-white w-full max-w-md p-10 rounded-[3rem] shadow-2xl">
                            <h3 class="text-2xl font-black text-pink-600 mb-6">{{ modalMode === 'add' ? 'Tambah' : 'Edit' }} Buku</h3>
                            <form @submit.prevent="saveBuku" class="space-y-4">
                                <input v-model="form.judul" placeholder="Judul" 
                                       class="w-full px-5 py-4 bg-pink-50/70 border-2 border-pink-200 rounded-2xl outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 font-medium text-slate-700 placeholder:text-slate-400 text-sm transition-all shadow-inner" required>
                                
                                <input v-model="form.penulis" placeholder="Penulis" 
                                       class="w-full px-5 py-4 bg-pink-50/70 border-2 border-pink-200 rounded-2xl outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 font-medium text-slate-700 placeholder:text-slate-400 text-sm transition-all shadow-inner" required>
                                
                                <input v-model.number="form.kategori_id" type="number" placeholder="Genre ID" 
                                       class="w-full px-5 py-4 bg-pink-50/70 border-2 border-pink-200 rounded-2xl outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 font-medium text-slate-700 placeholder:text-slate-400 text-sm transition-all shadow-inner" required>
                                
                                <input v-model.number="form.stok" type="number" placeholder="Stok" 
                                       class="w-full px-5 py-4 bg-pink-50/70 border-2 border-pink-200 rounded-2xl outline-none focus:border-pink-500 focus:ring-4 focus:ring-pink-100 font-medium text-slate-700 placeholder:text-slate-400 text-sm transition-all shadow-inner" required>
                                
                                <div class="flex justify-end gap-5 pt-4 items-center">
                                    <button @click="showModal = false" type="button" class="font-bold text-sm text-slate-400 hover:text-slate-600 tracking-wider uppercase">BATAL</button>
                                    <button type="submit" class="px-8 py-3.5 bg-pink-500 hover:bg-pink-600 text-white rounded-xl font-bold text-sm shadow-md shadow-pink-200 transition-transform active:scale-95 tracking-wider uppercase">SIMPAN</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `,
            data() {
                return { 
                    listBuku: [], 
                    listPeminjaman: [], 
                    showModal: false, 
                    modalMode: 'add', 
                    form: { id: null, judul: '', penulis: '', kategori_id: '', stok: 0 } 
                }
            },
            computed: {
                totalJudul() { return this.listBuku.length; },
                totalStok() { return this.listBuku.reduce((accum, item) => accum + (parseInt(item.stok) || 0), 0); },
                totalKosong() { return this.listBuku.filter(item => parseInt(item.stok) === 0).length; }
            },
            mounted() { 
                this.fetchBuku(); 
                this.fetchRiwayatPeminjaman(); 
            },
            methods: {
                async fetchBuku() {
                    try {
                        const res = await axios.get('http://localhost:8080/api/buku', {
                            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                        });
                        this.listBuku = res.data;
                    } catch (err) { console.error(err); }
                },
                async fetchRiwayatPeminjaman() {
                    try {
                        const res = await axios.get('http://localhost:8080/api/peminjaman', {
                            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                        });
                        this.listPeminjaman = res.data;
                    } catch (err) { console.error("Gagal mengambil log peminjaman:", err); }
                },
                openModal(mode, data = null) {
                    this.modalMode = mode;
                    this.form = data ? { ...data } : { id: null, judul: '', penulis: '', kategori_id: '', stok: 0 };
                    this.showModal = true;
                },
                async saveBuku() {
                    try {
                        const isEdit = this.modalMode === 'edit';
                        const url = isEdit ? 'http://localhost:8080/api/buku/' + this.form.id : 'http://localhost:8080/api/buku';
                        const method = isEdit ? 'put' : 'post'; 
                        
                        await axios[method](url, this.form, {
                            headers: { 
                                'Authorization': 'Bearer ' + localStorage.getItem('token'),
                                'Content-Type': 'application/json' 
                            }
                        });
                        
                        this.showModal = false;
                        this.fetchBuku();
                    } catch (err) {
                        console.error("Error Detail:", err.response?.data);
                        alert('Gagal: ' + (err.response?.data?.messages?.error || 'Periksa koneksi/token'));
                    }
                },
                async deleteBuku(id) {
                    if (confirm('Yakin ingin menghapus komik/buku?')) {
                        try {
                            await axios.delete('http://localhost:8080/api/buku/' + id, {
                                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                            });
                            this.fetchBuku();
                        } catch (err) { alert('Gagal menghapus'); }
                    }
                },
                async kembalikanBuku(id) {
                    try {
                        await axios.put('http://localhost:8080/api/peminjaman/' + id, { status: 'Dikembalikan' }, {
                            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                        });
                        this.fetchRiwayatPeminjaman();
                        this.fetchBuku(); 
                    } catch (err) { 
                        alert('Gagal mengupdate status!'); 
                        console.error(err);
                    }
                }
            }
        };

        // ============================================================================
        // 4. KOMPONEN: KATALOG UTAMA & FORM PINJAM (Sebelum ini: app.js -> Home Component)
        // ============================================================================
        const Home = {
            components: {
                'buku-stats-manager': BukuStatsManager // Mendaftarkan sub-komponen
            },
            template: `
                <div class="min-h-screen bg-pink-50 bg-[radial-gradient(#fecdd3_1px,transparent_1px)] [background-size:20px_20px]">
                    <div class="space-y-12 max-w-7xl mx-auto mt-10 px-6 pb-20 animate-in fade-in duration-700">
                        
                        <div class="relative overflow-hidden bg-gradient-to-r from-pink-500 to-rose-500 p-12 rounded-[2.5rem] text-white shadow-2xl shadow-rose-300/50">
                            <h2 class="text-5xl font-black tracking-tighter mb-3">🎀 Marsya's Library</h2>
                            <p class="text-pink-50 text-lg font-medium opacity-90 max-w-lg">
                                Jelajahi koleksi komik & Buku eksklusif kami. Pinjam dengan mudah dan nikmati tanpa batas.
                            </p>
                        </div>

                        <div class="max-w-full px-1">
                            <div class="relative bg-white rounded-2xl border-2 border-pink-200 shadow-md shadow-pink-100/60 focus-within:border-pink-500 focus-within:ring-4 focus-within:ring-pink-100 transition-all duration-300">
                                <div class="absolute inset-y-0 left-0 flex items-center pl-5 pointer-events-none text-xl drop-shadow-sm">
                                    🔍
                                </div>
                                <input 
                                    v-model="searchQuery" 
                                    type="text" 
                                    placeholder="Cari komik atau penulis favoritmu di sini..." 
                                    class="w-full pl-14 pr-12 py-4 bg-transparent text-slate-700 placeholder-pink-300 font-bold rounded-2xl outline-none text-base"
                                />
                                <button 
                                    v-if="searchQuery" 
                                    @click="searchQuery = ''" 
                                    class="absolute inset-y-0 right-0 flex items-center pr-5 text-pink-400 hover:text-pink-600 transition-colors font-black text-lg"
                                >
                                    ✕
                                </button>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" v-if="filteredBuku.length > 0">
                            <div v-for="buku in filteredBuku" :key="buku.id" 
                                 class="group bg-white p-7 rounded-[2rem] border border-pink-100 shadow-lg shadow-pink-100/50 hover:shadow-2xl hover:shadow-pink-200 transition-all duration-500 flex flex-col justify-between hover:-translate-y-2">
                                
                                <div>
                                    <div class="w-16 h-16 bg-pink-50 text-pink-500 rounded-2xl flex items-center justify-center text-3xl mb-6 shadow-inner">📚</div>
                                    <h3 class="font-bold text-slate-800 text-xl mb-1 leading-tight">{{ buku.judul }}</h3>
                                    <p class="text-pink-500 text-sm font-bold mb-6">{{ buku.penulis }}</p>
                                </div>

                                <div>
                                    <div class="flex justify-between items-center mb-6 text-[11px] font-black uppercase tracking-wider">
                                        <span :class="parseInt(buku.stok) > 0 ? 'text-pink-600 bg-pink-100 px-3 py-1 rounded-full' : 'text-rose-500 bg-rose-50 px-3 py-1 rounded-full'">
                                            {{ parseInt(buku.stok) > 0 ? '● Tersedia' : '● Habis' }}
                                        </span>
                                        <span class="text-slate-400">{{ buku.stok }} Unit</span>
                                    </div>

                                    <button @click="bukaModalPinjam(buku)" 
                                            :disabled="parseInt(buku.stok) <= 0"
                                            class="w-full py-3.5 rounded-2xl font-bold text-sm transition-all duration-300 shadow-md active:scale-95"
                                            :class="parseInt(buku.stok) > 0 ? 'bg-pink-500 hover:bg-pink-600 text-white' : 'bg-slate-100 text-slate-400 cursor-not-allowed'">
                                        {{ parseInt(buku.stok) > 0 ? 'Pinjam Sekarang' : 'Stok Kosong' }}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div v-else-if="listBuku.length > 0" class="text-center py-16 bg-white rounded-[2rem] border border-dashed border-pink-200 max-w-md mx-auto p-8">
                            <p class="text-4xl animate-bounce">❌</p>
                            <h4 class="font-bold text-slate-700 text-lg mt-3">Buku Tidak Ditemukan</h4>
                            <p class="text-sm text-slate-400 mt-1">Tidak ada koleksi komik bernama "{{ searchQuery }}".</p>
                        </div>
                    </div>

                    <buku-stats-manager :listBuku="listBuku"></buku-stats-manager>

                    <div v-if="showModalPinjam" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-xs">
                        <div class="bg-white w-full max-w-sm p-8 rounded-[2rem] shadow-2xl border border-pink-100 space-y-6">
                            <div>
                                <h3 class="text-xl font-black text-pink-600">Form Pinjam Buku</h3>
                                <p class="text-xs font-bold text-slate-400 mt-1 truncate">Komik: {{ bukuDipilih.judul }}</p>
                            </div>

                            <form @submit.prevent="eksekusiPinjam" class="space-y-4">
                                <div>
                                    <input v-model="inputForm.nama" type="text" 
                                           class="w-full px-5 py-3.5 bg-pink-50/50 border border-pink-100 rounded-2xl focus:outline-none focus:border-pink-400 text-slate-700 font-medium placeholder:text-slate-400 text-sm" 
                                           placeholder="Nama Lengkap Peminjam" required>
                                </div>

                                <div>
                                    <input v-model="inputForm.tanggal" type="date" 
                                           class="w-full px-5 py-3.5 bg-pink-50/50 border border-pink-100 rounded-2xl focus:outline-none focus:border-pink-400 text-slate-700 font-medium text-sm" 
                                           required>
                                </div>
                                
                                <div class="flex items-center justify-end space-x-6 pt-2">
                                    <button type="button" @click="tutupModalPinjam"
                                            class="font-bold text-sm text-slate-400 hover:text-slate-600 tracking-wider uppercase">
                                        BATAL
                                    </button>
                                    <button type="submit" 
                                            class="px-6 py-3 bg-pink-500 hover:bg-pink-600 text-white font-bold text-sm rounded-xl transition-transform active:scale-95 tracking-wider uppercase">
                                        SIMPAN
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            `,
            data() { 
                return { 
                    listBuku: [],
                    searchQuery: '',
                    showModalPinjam: false,
                    bukuDipilih: {},
                    inputForm: { nama: '', tanggal: '' }
                } 
            },
            computed: {
                filteredBuku() {
                    const query = this.searchQuery.toLowerCase().trim();
                    if (!query) return this.listBuku;
                    return this.listBuku.filter(buku => {
                        const judul = buku.judul ? buku.judul.toLowerCase() : '';
                        const penulis = buku.penulis ? buku.penulis.toLowerCase() : '';
                        return judul.includes(query) || penulis.includes(query);
                    });
                }
            },
            methods: {
                async fetchKatalog() {
                    try {
                        const response = await axios.get('http://localhost:8080/api/buku');
                        this.listBuku = response.data;
                    } catch (error) { console.error(error); }
                },
                bukaModalPinjam(buku) {
                    this.bukuDipilih = buku;
                    this.inputForm.nama = '';
                    this.inputForm.tanggal = new Date().toISOString().split('T')[0];
                    this.showModalPinjam = true;
                },
                tutupModalPinjam() {
                    this.showModalPinjam = false;
                    this.bukuDipilih = {};
                },
                eksekusiPinjam() {
                    if (!this.inputForm.nama.trim()) return;

                    axios.post('http://localhost:8080/api/peminjaman', { 
                        buku_id: this.bukuDipilih.id, 
                        nama_peminjam: this.inputForm.nama,
                        tanggal_pinjam: this.inputForm.tanggal
                    })
                    .then(() => { 
                        alert("Sukses Peminjaman!"); 
                        this.bukuDipilih.stok = parseInt(this.bukuDipilih.stok) - 1; 
                        this.tutupModalPinjam();
                        this.fetchKatalog(); // Auto-refresh data katalog & statistik
                    })
                    .catch(() => alert("Gagal meminjam."));
                }
            },
            mounted() { this.fetchKatalog(); }
        };

        // ============================================================================
        // 5. KONFIGURASI VUE ROUTER (Sebelum ini: app.js -> Router Section)
        // ============================================================================
        const router = VueRouter.createRouter({
            history: VueRouter.createWebHashHistory(),
            routes: [
                { path: '/', component: Home },
                { path: '/login', component: Login },
                { path: '/dashboard', component: Dashboard, meta: { requiresAuth: true } }
            ]
        });

        // Global Navigation Guard untuk menyekat akses dashboard jika belum login
        router.beforeEach((to, from, next) => {
            const authenticated = localStorage.getItem('isLoggedIn') === 'true';
            if (to.meta.requiresAuth && !authenticated) {
                next('/login');
            } else {
                next();
            }
        });

        // ============================================================================
        // 6. INITIALIZATION CORE VUE INSTANCE (Sebelum ini: app.js -> Vue initialization)
        // ============================================================================
        const app = Vue.createApp({
            data() { 
                return { 
                    isLoggedIn: localStorage.getItem('isLoggedIn') === 'true' 
                } 
            },
            methods: {
                logout() {
                    localStorage.clear();
                    this.isLoggedIn = false;
                    this.$router.push('/');
                    window.location.reload(); 
                }
            }
        });

        app.use(router);
        app.mount('#app');
    </script>
</body>
</html>
